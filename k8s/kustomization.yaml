apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-playground

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - redis-deployment.yaml
  - postgres-deployment.yaml
  - api-deployment.yaml

commonLabels:
  app.kubernetes.io/name: agent-playground
  app.kubernetes.io/version: "0.1.0"

images:
  - name: agent-playground-api
    newTag: latest
