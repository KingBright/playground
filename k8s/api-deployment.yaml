apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-playground-api
  namespace: agent-playground
  labels:
    app: agent-playground-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-playground-api
  template:
    metadata:
      labels:
        app: agent-playground-api
    spec:
      containers:
        - name: api
          image: agent-playground-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: agent-playground-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-playground-secrets
                  key: POSTGRES_PASSWORD
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-playground-secrets
                  key: NEO4J_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: static-files
              mountPath: /app/static
            - name: archive-data
              mountPath: /app/archive
      volumes:
        - name: static-files
          emptyDir: {}
        - name: archive-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-playground-api
  namespace: agent-playground
spec:
  selector:
    app: agent-playground-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-playground-ingress
  namespace: agent-playground
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: agent-playground.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-playground-api
                port:
                  number: 8080
