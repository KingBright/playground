# Agent Playground - Docker Compose 配置
# 注意：version 属性已移除（Docker Compose v2+ 不再需要）
#
# 平台支持：
# - 自动检测架构（AMD64/x86_64 或 ARM64/Apple Silicon）
# - 使用 ${DOCKER_PLATFORM:-} 环境变量可覆盖平台选择
# - 默认为原生架构（Docker 自动选择）

services:
  # ==========================================
  # 核心应用服务
  # ==========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - API_PORT=8080
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/agent_platform
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      - ./data/static:/app/static
      - ./data/archive:/app/archive
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # 前端服务 (可选，也可以由 API 服务直接提供静态文件)
  # ==========================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    networks:
      - agent-network
    restart: unless-stopped
    profiles:
      - with-web

  # ==========================================
  # 数据存储服务
  # ==========================================

  # Redis - Hot Memory (内存优化配置)
  # 支持 AMD64 和 ARM64 (Apple Silicon)
  redis:
    image: redis:7-alpine
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - agent-network
    restart: unless-stopped
    # 内存限制：最大 256MB，可根据需要调整
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256m}
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # PostgreSQL - 关系型数据存储
  # 支持 AMD64 和 ARM64 (Apple Silicon)
  postgres:
    image: postgres:15-alpine
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agent_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Qdrant - Vector Database
  # 支持 AMD64 和 ARM64 (Apple Silicon)
  qdrant:
    image: qdrant/qdrant:latest
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Neo4j - Graph Database
  # 支持 AMD64 和 ARM64 (Apple Silicon)
  neo4j:
    image: neo4j:5-community
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO - Raw Archive (S3-compatible)
  # 支持 AMD64 和 ARM64 (Apple Silicon)
  minio:
    image: minio/minio:latest
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - agent-network
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # 工具服务
  # ==========================================

  # 初始化服务 - 创建必要的 buckets 和数据库
  init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/agent-archive || true;
      /usr/bin/mc policy set public myminio/agent-archive;
      exit 0;
      "
    networks:
      - agent-network
    profiles:
      - init

volumes:
  redis-data:
  postgres-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  minio-data:

networks:
  agent-network:
    driver: bridge
