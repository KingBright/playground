# Redis 配置文件 - 内存优化版
# 适用于 Agent Playground 项目

# ==========================================
# 内存管理
# ==========================================

# 最大内存限制（由 Docker 控制，这里设置作为双重保险）
# 默认 256mb，可通过环境变量覆盖
maxmemory 256mb

# 内存淘汰策略：allkeys-lru
# 当内存不足时，优先淘汰最近最少使用的 key
maxmemory-policy allkeys-lru

# 内存样本数量，用于 LRU 算法
maxmemory-samples 5

# ==========================================
# 持久化配置
# ==========================================

# RDB 持久化（适合备份迁移）
# 900 秒内至少 1 个 key 变化则保存
save 900 1
# 300 秒内至少 10 个 key 变化则保存
save 300 10
# 60 秒内至少 10000 个 key 变化则保存
save 60 10000

# 禁用 AOF（减少磁盘占用，适合 Hot Memory 场景）
appendonly no

# RDB 文件名
dbfilename dump.rdb

# 数据目录
dir /data

# ==========================================
# 连接配置
# ==========================================

# 监听所有接口
bind 0.0.0.0

# 端口
port 6379

# 保护模式（Docker 网络内关闭，生产环境建议开启密码）
protected-mode no

# 最大客户端连接数
maxclients 1000

# 空闲连接超时（秒）
timeout 300

# TCP  keepalive
tcp-keepalive 300

# ==========================================
# 性能优化（低内存场景）
# ==========================================

# 禁用 THP（透明大页）警告
# 需要在宿主机上执行: echo never > /sys/kernel/mm/transparent_hugepage/enabled

# 设置 hash 编码阈值，小数据使用更省内存的编码
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 设置 list 编码阈值
list-max-ziplist-size -2
list-compress-depth 0

# 设置 set 编码阈值
set-max-intset-entries 512

# 设置 zset 编码阈值
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog 编码阈值
hll-sparse-max-bytes 3000

# 流编码阈值
stream-node-max-bytes 4096
stream-node-max-entries 100

# ==========================================
# 日志配置
# ==========================================

# 日志级别: debug, verbose, notice, warning
loglevel notice

# 日志文件（空表示输出到 stdout）
logfile ""

# 数据库数量（默认 16 个，可以减小到 8 节省内存）
databases 8

# ==========================================
# 安全配置（可选）
# ==========================================

# 如果需要密码认证，取消下面注释并设置密码
# requirepass your_password_here

# 命令重命名（禁用危险命令）
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG "CONFIG_9f1b2c3d"
